<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Compiler Chat — Ashwin</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #202c33;
            --wa-teal: #00a884;
            --wa-bubble-out: #005c4b;
            --wa-bubble-in: #202c33;
            --wa-text: #e9edef;
            --wa-muted: #8696a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--wa-bg); color: var(--wa-text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

        /* Header Styling */
        header { 
            background: var(--wa-header); padding: 10px 20px; 
            display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .profile-pic { width: 40px; height: 40px; border-radius: 50%; background: var(--wa-muted); margin-right: 15px; }
        .header-info h1 { font-size: 16px; font-weight: 600; }
        .header-info p { font-size: 12px; color: var(--wa-teal); }

        /* Layout Grid */
        .chat-container { flex: 1; display: grid; grid-template-columns: 450px 1fr; overflow: hidden; }

        /* Sidebar / Editor */
        .editor-side { background: #111b21; border-right: 1px solid #222d34; padding: 20px; display: flex; flex-direction: column; }
        .label { color: var(--wa-teal); font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; }
        textarea { 
            flex: 1; background: #2a3942; border: none; border-radius: 10px; color: white; 
            padding: 15px; font-family: 'Consolas', monospace; resize: none; outline: none;
        }
        .btn-send { 
            background: var(--wa-teal); border: none; padding: 12px; border-radius: 8px; 
            color: #0b141a; font-weight: 700; margin-top: 15px; cursor: pointer; transition: 0.2s;
        }
        .btn-send:hover { opacity: 0.9; transform: scale(0.98); }

        /* Chat Side / Output */
        .output-side { 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
            background-size: contain; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }

        .bubble { 
            max-width: 85%; padding: 10px 15px; border-radius: 10px; position: relative; font-size: 14px; line-height: 1.4;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }
        .bubble.in { background: var(--wa-bubble-in); align-self: flex-start; border-top-left-radius: 0; }
        .bubble.out { background: var(--wa-bubble-out); align-self: flex-end; border-top-right-radius: 0; color: #e9edef; }
        .bubble-header { color: var(--wa-teal); font-size: 11px; font-weight: 700; margin-bottom: 5px; }

        /* Table inside Chat */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        td { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .code-block { font-family: 'Consolas', monospace; white-space: pre; font-size: 13px; }

        footer { 
            background: var(--wa-header); padding: 15px 30px; border-top: 1px solid #222d34;
            display: flex; justify-content: space-between; align-items: center; color: var(--wa-muted); font-size: 13px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="profile-pic"></div>
    <div class="header-info">
        <h1>Compiler Project Group</h1>
        <p>online (Ashwin & System)</p>
    </div>
</header>

<div class="chat-container">
    <div class="editor-side">
        <span class="label">Type Source Code</span>
        <textarea id="codeInput" spellcheck="false">int main() {
    int x = 10;
    int y = 20;
    int sum = x + y;
    return 0;
}</textarea>
        <button class="btn-send" onclick="simulateCompilation()">Run Simulation</button>
    </div>

    <div class="output-side" id="chatHistory">
        <div class="bubble in">
            <div class="bubble-header">SYSTEM</div>
            Hello Ashwin! Paste your C code and click "Run" to generate the target code.
        </div>
    </div>
</div>

<footer>
    <div>Student: <strong>Ashwin</strong></div>
    <div>Registration: <strong>RA2311003050382</strong></div>
</footer>

<script>
    function simulateCompilation() {
        const input = document.getElementById('codeInput').value;
        const chat = document.getElementById('chatHistory');

        // 1. User "Sent" Code
        chat.innerHTML += `
            <div class="bubble out">
                <div class="bubble-header">YOU</div>
                Requested compilation for: <br><i>${input.substring(0, 30)}...</i>
            </div>
        `;

        // 2. System "Replied" with Tokens
        let tokenRows = "";
        const words = input.match(/\w+|[=+*/-]|[();{}]/g);
        words.slice(0, 8).forEach(w => {
            tokenRows += `<tr><td>${w}</td><td style="color:var(--wa-teal)">TOKEN</td></tr>`;
        });

        setTimeout(() => {
            chat.innerHTML += `
                <div class="bubble in">
                    <div class="bubble-header">LEXICAL ANALYZER</div>
                    Tokens Generated:
                    <table>${tokenRows}</table>
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
        }, 500);

        // 3. System "Replied" with ASM
        setTimeout(() => {
            chat.innerHTML += `
                <div class="bubble in">
                    <div class="bubble-header">CODE GENERATOR</div>
                    Target Assembly:<br>
                    <div class="code-block" style="color:#fbbf24">
MOV EAX, [x]
ADD EAX, [y]
MOV [sum], EAX
RET</div>
                </div>
            `;
            chat.scrollTop = chat.scrollHeight;
        }, 1200);
    }
</script>

</body>
</html>
