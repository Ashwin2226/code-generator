<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Target Code Gen — Ashwin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
    :root {
        --bg: #020617;
        --panel: #1e293b;
        --accent: #06b6d4;
        --accent-glow: rgba(6, 182, 212, 0.3);
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
    }
    body {
        margin: 0; padding: 20px;
        background-color: var(--bg);
        color: var(--text-main);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header { 
        display: flex; justify-content: space-between; align-items: center;
        padding-bottom: 20px; border-bottom: 1px solid #334155; margin-bottom: 30px;
    }
    .brand { font-size: 24px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(to right, #06b6d4, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .card { 
        background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; 
        padding: 24px; position: relative; overflow: hidden;
    }
    .card-label { font-size: 12px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 15px; display: block; }
    
    textarea {
        width: 100%; height: 400px; background: #020617; border: 1px solid #334155;
        border-radius: 12px; color: #e2e8f0; padding: 15px; font-family: 'JetBrains Mono', monospace;
        font-size: 14px; outline: none; transition: 0.3s;
    }
    textarea:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    .btn-main { 
        background: var(--accent); color: #000; border: none; padding: 12px 24px; 
        border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }

    .tabs { display: flex; border-bottom: 1px solid #334155; margin-bottom: 20px; }
    .tab { 
        padding: 10px 20px; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; 
        font-weight: 600; font-size: 14px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Results Table styling */
    .results-area { height: 400px; overflow-y: auto; background: #020617; border-radius: 12px; padding: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--text-dim); padding: 10px; border-bottom: 1px solid #1e293b; }
    td { padding: 10px; border-bottom: 1px solid #0f172a; color: #cbd5e1; }
    
    footer {
        margin-top: 40px; padding: 20px; border-top: 1px solid #1e293b;
        display: flex; justify-content: space-between; color: var(--text-dim); font-size: 14px;
    }
    .hidden { display: none; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">PROX-GEN COMPILER</div>
        <div id="status" style="font-size: 13px; color: var(--text-dim);">System Ready</div>
    </header>

    <div class="layout">
        <div class="card">
            <span class="card-label">Input Source Code</span>
            <textarea id="code" spellcheck="false">int main() {
    int a = 5;
    int b = 10;
    int c = a + b;
    return c;
}</textarea>
            <div class="btn-group">
                <button class="btn-main" onclick="process()">Compile & Generate</button>
                <button style="background:transparent; color:white; border:1px solid #334155; padding:10px; border-radius:8px; cursor:pointer;" onclick="document.getElementById('code').value=''">Clear</button>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab(event, 'tokens')">Tokens</div>
                <div class="tab" onclick="switchTab(event, 'tac')">Intermediate (TAC)</div>
                <div class="tab" onclick="switchTab(event, 'asm')">Target ASM</div>
            </div>
            
            <div id="tokens" class="results-area">
                <table>
                    <thead><tr><th>#</th><th>Type</th><th>Lexeme</th></tr></thead>
                    <tbody id="token-body"></tbody>
                </table>
            </div>

            <div id="tac" class="results-area hidden" style="font-family: monospace; white-space: pre; padding: 20px; color: #10b981;"></div>
            
            <div id="asm" class="results-area hidden" style="font-family: monospace; white-space: pre; padding: 20px; color: #f59e0b;"></div>
        </div>
    </div>

    <footer>
        <div>Student: <strong>Ashwin</strong></div>
        <div>Reg No: <strong>RA2311003050382</strong></div>
    </footer>
</div>

<script>
    function switchTab(evt, tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.results-area').forEach(r => r.classList.add('hidden'));
        evt.currentTarget.classList.add('active');
        document.getElementById(tabName).classList.remove('hidden');
    }

    function process() {
        const code = document.getElementById('code').value;
        const tokenBody = document.getElementById('token-body');
        const tacArea = document.getElementById('tac');
        const asmArea = document.getElementById('asm');
        
        // Simulating the Lexical Analysis
        const lines = code.split('\n');
        tokenBody.innerHTML = "";
        let count = 1;
        
        // Basic keywords for simulation
        const keywords = ['int', 'float', 'return', 'if', 'else', 'while', 'main'];
        
        code.match(/\w+|[=+*/-]|[();{}]/g).forEach(val => {
            let type = keywords.includes(val) ? "KEYWORD" : (/\d+/.test(val) ? "CONSTANT" : (/\w+/.test(val) ? "IDENTIFIER" : "OPERATOR"));
            tokenBody.innerHTML += `<tr><td>${count++}</td><td><span class="badge" style="background:#1e293b">${type}</span></td><td>${val}</td></tr>`;
        });

        // Simulating TAC
        tacArea.innerText = `t1 = a + b\nt2 = return t1`;
        
        // Simulating Assembly
        asmArea.innerText = `MOV EAX, [a]\nADD EAX, [b]\nMOV [c], EAX\nRET`;
        
        document.getElementById('status').innerText = "Compilation Successful";
    }
</script>

</body>
</html>
